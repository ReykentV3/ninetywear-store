<body class="bg-tech-bg dark:bg-tech-darkbg text-black dark:text-white transition-colors duration-300 selection:bg-tech-red selection:text-white">
    <!-- Contenedor principal de React -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { ShoppingCart, Menu, Search, Activity, Cpu, AlertTriangle, Skull, Power, Moon, Sun, X } from 'https://esm.sh/lucide-react@0.263.1';

        // --- ESTILOS SISTEMA CORRUPTO / TECHWEAR ---
        const customStyles = `
          @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

          @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
          }
          .animate-marquee {
            display: inline-flex;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
          }
          
          /* Efecto de ruido/scanline */
          .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 20;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
          }

          .glitch-hover:hover {
            color: #FF003C;
            text-shadow: 2px 2px #00F0FF;
          }

          /* Animación sutil y precisa de ORDEN/CAOS Swap */
          @keyframes swap-orden {
            0%, 80% { opacity: 1; visibility: visible; }
            80.1%, 100% { opacity: 0; visibility: hidden; }
          }
          @keyframes swap-caos {
            0%, 80% { opacity: 0; visibility: hidden; }
            80.1%, 100% { opacity: 1; visibility: visible; }
          }
          @keyframes static-glitch {
            0% { transform: translate(0) skew(0deg); clip-path: inset(0 0 0 0); }
            10% { transform: translate(-3px, 1px) skew(-5deg); clip-path: inset(20% 0 10% 0); }
            20% { transform: translate(3px, -1px) skew(5deg); clip-path: inset(10% 0 60% 0); }
            30% { transform: translate(-1px, 2px) skew(-2deg); clip-path: inset(80% 0 5% 0); opacity: 0.8; }
            40% { transform: translate(2px, -2px) skew(2deg); clip-path: inset(40% 0 40% 0); }
            50% { transform: translate(-2px, 0) skew(-5deg); clip-path: inset(60% 0 20% 0); }
            60% { transform: translate(1px, 1px) skew(5deg); clip-path: inset(15% 0 70% 0); opacity: 0.9; }
            70% { transform: translate(-1px, -1px) skew(-3deg); clip-path: inset(45% 0 35% 0); }
            80% { transform: translate(2px, 2px) skew(3deg); clip-path: inset(70% 0 15% 0); }
            90% { transform: translate(-2px, -2px) skew(-5deg); clip-path: inset(5% 0 85% 0); }
            100% { transform: translate(0) skew(0deg); clip-path: inset(0 0 0 0); opacity: 1; }
          }
          
          .animate-orden-swap {
            animation: swap-orden 2.5s infinite steps(1);
            display: inline-block;
          }
          .animate-caos-swap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            animation: swap-caos 2.5s infinite steps(1);
            pointer-events: none;
          }
          
          .cyber-caos-text {
            position: relative;
            display: inline-block;
            color: #111;
            animation: static-glitch 0.2s infinite steps(3);
          }
          .dark .cyber-caos-text {
            color: #FFF;
          }
          .cyber-caos-text::before, .cyber-caos-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
            opacity: 0.8;
            color: inherit;
          }
          .cyber-caos-text::before {
            left: -3px; 
            animation: static-glitch 0.1s infinite steps(2) reverse;
          }
          .cyber-caos-text::after {
            left: 3px; 
            animation: static-glitch 0.15s infinite steps(2) alternate;
          }

          .tech-shadow {
            box-shadow: 4px 4px 0px 0px currentColor; /* Sombra dinámica según el texto/color activo */
            transition: all 0.1s ease;
          }
          .tech-shadow:active {
            box-shadow: 1px 1px 0px 0px currentColor;
            transform: translate(3px, 3px);
          }
          @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px) scale(0.99); filter: blur(2px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
          }
          .animate-fade-in {
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
          }
          
          .font-tech {
            font-family: 'Space Mono', monospace;
          }
          
          /* Outline dinámico (blanco o negro según modo) */
          .text-outline {
            color: transparent;
            -webkit-text-stroke: 2px black;
          }
          .dark .text-outline {
            -webkit-text-stroke: 2px white;
          }

          .text-outline-white {
            color: transparent;
            -webkit-text-stroke: 1px white;
          }
          .dark .pattern-grid {
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
          }
          .pattern-grid {
            background-image: linear-gradient(rgba(0,0,0,1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,1) 1px, transparent 1px);
            background-size: 20px 20px;
          }
        `;

          // --- COMPONENTE INTERNO: BOTONES DE PAYPAL NATIVOS ---
          const PayPalButtonsWrapper = ({ amount, onApprove }) => {
            const containerRef = React.useRef(null);

            useEffect(() => {
              if (window.paypal && containerRef.current) {
                containerRef.current.innerHTML = '';
                window.paypal.Buttons({
                  style: {
                    layout: 'vertical',
                    color:  'blue',
                    shape:  'rect',
                    label:  'paypal'
                  },
                  createOrder: (data, actions) => {
                    return actions.order.create({
                      purchase_units: [{ 
                        amount: { 
                          currency_code: 'USD',
                          value: amount 
                        } 
                      }]
                    });
                  },
                  onApprove: (data, actions) => {
                    return actions.order.capture().then(details => {
                      onApprove(data);
                    });
                  },
                  onError: (err) => {
                    console.error("PayPal Pipeline Error:", err);
                    alert("ERROR_DE_PIPELINE: PAYPAL_REJECTED");
                  }
                }).render(containerRef.current);
              }
            }, [amount]);

            return <div ref={containerRef} className="w-full min-h-[150px]"></div>;
          };

        function App() {
          const [isMenuOpen, setIsMenuOpen] = useState(false);
          const [scrolled, setScrolled] = useState(false);
          const [systemTime, setSystemTime] = useState('');
          
          // DARK MODE STATE
          const [isDark, setIsDark] = useState(false);
          const [terminalLogs, setTerminalLogs] = useState([]);
          // RUTAS / ESTADO DE VISTA
          const [currentPage, setCurrentPage] = useState('home'); // 'home', 'login', 'nosotros'
          
          // FILTERS STATE
          const [activeCategory, setActiveCategory] = useState('ALL_FILES - TODOS');
          const [activeSub, setActiveSub] = useState(null);

          // WC STORE STATE
          const [storeProducts, setStoreProducts] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [selectingVariationsForId, setSelectingVariationsForId] = useState(null);
          const [selectedProduct, setSelectedProduct] = useState(null);
          const [selectedVariationId, setSelectedVariationId] = useState(null);
          const [selectedAttributes, setSelectedAttributes] = useState({});

          // Resetear selecciones cuando cambiamos de producto
          useEffect(() => {
            setSelectedAttributes({});
            setSelectedVariationId(null);
          }, [selectedProduct]);

          // --- WC CART STATE & LOGIC ---
          const [cart, setCart] = useState(null);
          // Leer el Nonce directamente desde la variable global inyectada por WordPress (PHP)
          const [cartNonce, setCartNonce] = useState(window.wcNonce || '');
          // Recuperar Cart-Token persistido si existe
          const [cartToken, setCartToken] = useState(localStorage.getItem('wc_cart_token') || '');
          const [isCartOpen, setIsCartOpen] = useState(false);
          const [isUpdatingCart, setIsUpdatingCart] = useState(false);

          // --- CHECKOUT STATES ---
          const [checkoutStep, setCheckoutStep] = useState(null); // null, 'shipping', 'payment', 'processing', 'success'
          const [shippingDetails, setShippingDetails] = useState({
            first_name: '', last_name: '', address_1: '', city: '', postcode: '', country: 'PE', email: '', phone: ''
          });
          const [paypalLoaded, setPaypalLoaded] = useState(false);

          const fetchCart = async () => {
            try {
               const currentNonce = window.wcNonce || cartNonce;
               if (currentNonce && currentNonce !== cartNonce) setCartNonce(currentNonce);

               const currentToken = localStorage.getItem('wc_cart_token') || cartToken;
               const fetchHeaders = {};
               if (currentToken) fetchHeaders['Cart-Token'] = currentToken;

               const res = await fetch('https://ninetywear.com/wp-json/wc/store/v1/cart', {
                 credentials: 'include',
                 headers: fetchHeaders
               });
               
               const newToken = res.headers.get('Cart-Token') || res.headers.get('cart-token');
               if (newToken) {
                 setCartToken(newToken);
                 localStorage.setItem('wc_cart_token', newToken);
               }

               const data = await res.json();
               setCart(data);
            } catch (err) {
              console.error("Fetch error:", err);
            }
          };

          useEffect(() => {
            fetchCart();
          }, []);
          
          // FAKE SALES LOGIC & STATE
          const [fakeSale, setFakeSale] = useState(null);

          useEffect(() => {
            if (storeProducts.length === 0) return;

            const firstNames = ['Zack', 'David', 'Andrea', 'Kaia', 'Renzo', 'Cyber', 'Ghost', 'Neon', 'Matias', 'Sara', 'V', 'Kael', 'Luna', 'Nova', 'Rox', 'Zero', 'Aiden', 'Mia', 'Cruz', 'Raven', 'Leo', 'Max', 'Sam', 'Joi', 'Ken', 'B.', 'X.', 'Lana', 'K.', 'Ryo'];
            const lastNames = ['M.', 'G.', 'S.', 'H.', 'R.', '_99', '_X', 'Corp', 'Null', 'T.', 'V.', 'K.', 'L.', 'N.', 'R.', 'Z.', 'A.', 'M.', 'C.', 'W.', 'Net', 'Sys', '.exe', '.bat', '00'];
            
            let timeoutId;

            const executeSaleAndQueueNext = () => {
              // Hide after 6 seconds
              setTimeout(() => setFakeSale(null), 6000);

              // Wait random time between 7s and 21s
              const nextTime = Math.floor(Math.random() * (21000 - 7000 + 1)) + 7000;
              timeoutId = setTimeout(() => {
                const randomName = `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
                const randomProduct = storeProducts[Math.floor(Math.random() * storeProducts.length)];
                const shortProductName = randomProduct.name.split(' - ')[0]; // Limpiar nombres largos

                setFakeSale({ user: randomName, product: shortProductName, img: randomProduct.img, time: new Date().toLocaleTimeString('en-US', { hour12: false }) });
                executeSaleAndQueueNext();
              }, nextTime);
            };

            // Arranque inicial simulado entre 5s a 10s después de cargar el catálogo
            const initialTime = Math.floor(Math.random() * (10000 - 5000 + 1)) + 5000;
            timeoutId = setTimeout(() => {
              const randomName = `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
              const randomProduct = storeProducts[Math.floor(Math.random() * storeProducts.length)];
              const shortProductName = randomProduct.name.split(' - ')[0];
              
              setFakeSale({ user: randomName, product: shortProductName, img: randomProduct.img, time: new Date().toLocaleTimeString('en-US', { hour12: false }) });
              executeSaleAndQueueNext();
            }, initialTime);

            return () => clearTimeout(timeoutId);
          }, [storeProducts]);

          useEffect(() => {
            fetch('https://ninetywear.com/wp-json/wc/store/products')
              .then(res => res.json())
              .then(data => {
                const mappedProducts = data.map(p => {
                   // Calcular precio real basado en la unidad menor (ej: PEN usa 2 decimales, "14700" = 147.00)
                   const price = p.prices ? (parseFloat(p.prices.price) / (10 ** p.prices.currency_minor_unit)) : 0;
                   return {
                     id: p.id,
                     name: p.name,
                     category: p.categories && p.categories.length > 0 ? p.categories[0].name.toUpperCase() : 'TEES - CAMISETAS',
                     sub: p.attributes && p.attributes.length > 0 ? p.attributes[0].name.toUpperCase() : 'BASIC',
                     price: price,
                     img: p.images && p.images.length > 0 ? p.images[0].src : '',
                     stock: p.is_in_stock ? 'DISPONIBLE' : 'SOLD_OUT',
                     classTag: p.is_in_stock ? 'CORE_SISTEM' : 'YOU_DIED.EXE',
                     classTitle: p.is_in_stock ? 'group-hover:text-[#00F0FF]' : '',
                     btnClass: p.is_in_stock ? 'bg-black text-white hover:bg-[#FF003C] dark:bg-white dark:text-black' : '',
                     tagColor: p.is_in_stock ? 'bg-black text-white dark:bg-white dark:text-black' : 'bg-black text-[#FF003C]',
                     hasOptions: p.has_options || false,
                     variations: p.variations || [],
                     images: p.images || [],
                     description: p.description || '',
                     short_description: p.short_description || '',
                     permalink: p.permalink
                   };
                });
                setStoreProducts(mappedProducts);
                setIsLoading(false);
              })
              .catch(err => {
                console.error("Error fetching WC API:", err);
                setIsLoading(false);
              });
          }, []);

          const filteredProducts = storeProducts.filter(p => {
             if (activeCategory !== 'ALL_FILES - TODOS' && p.category !== activeCategory) return false;
             if (activeSub && p.sub !== activeSub) return false;
             return true;
          });

          // Dynamic Categories from API
          const categoriesList = ['ALL_FILES - TODOS', ...new Set(storeProducts.map(p => p.category))];
          const subcategories = activeCategory === 'ALL_FILES - TODOS' ? [] : [...new Set(storeProducts.filter(p => p.category === activeCategory).map(p => p.sub))];

          const handleCategoryClick = (cat) => {
             setActiveCategory(cat);
             setActiveSub(null);
          };

           const addToCart = async (product, variationId = null) => {
            if (typeof product === 'string') { // Compatibilidad con el Login Console mock logger
               const newLog = `> EJECUTANDO: ${product} ... [OK]`;
               setTerminalLogs(prev => [...prev, newLog]);
               setTimeout(() => setTerminalLogs(prev => prev.slice(1)), 3500);
               return;
            }

            if (product.hasOptions && !variationId) {
                setSelectingVariationsForId(product.id);
                return;
            }

            const targetId = variationId ? variationId : product.id;
            
            setTerminalLogs(prev => [...prev, `> INJECTING_PAYLOAD: PRODUCT_ID_${targetId}`]);
            setIsUpdatingCart(true);

            try {
              const nonce = window.wcNonce || cartNonce;
              const headers = { 
                'Content-Type': 'application/json',
                'Nonce': nonce
              };
              if (cartToken) headers['Cart-Token'] = cartToken;

              const response = await fetch('https://ninetywear.com/wp-json/wc/store/v1/cart/add-item', {
                method: 'POST',
                headers: headers,
                credentials: 'include',
                body: JSON.stringify({ id: targetId, quantity: 1 })
              });
              
              if (response.ok) {
                // CRÍTICO: Usar la respuesta del add-item directamente
                // El GET posterior puede estar cacheado por Hostinger y devolver vacío
                const newToken = response.headers.get('Cart-Token') || response.headers.get('cart-token');
                if (newToken) {
                  setCartToken(newToken);
                  localStorage.setItem('wc_cart_token', newToken);
                }
                const updatedCart = await response.json();
                setCart(updatedCart); // Usar el carrito de la respuesta directamente
                setTerminalLogs(prev => [...prev, `> UPLOAD_SUCCESS: ${updatedCart.items_count} ITEMS`]);
                setIsCartOpen(true);
              } else {
                const errBody = await response.text();
                console.error('Add item failed:', response.status, errBody);
                setTerminalLogs(prev => [...prev, `> ERROR: TRANSACTION_REJECTED (${response.status})`]);
              }
            } catch (err) {
              setTerminalLogs(prev => [...prev, `> FATAL_ERROR: CONNECTION_LOST`]);
            } finally {
              setIsUpdatingCart(false);
              setTimeout(() => setTerminalLogs(prev => prev.slice(1)), 4000);
            }
          }

          const removeFromCart = async (itemKey) => {
            setIsUpdatingCart(true);
            setTerminalLogs(prev => [...prev, `> TERMINATING_DATA_BLOCK: ${itemKey.substring(0,8)}...`]);
            try {
              const headers = { 
                'Content-Type': 'application/json',
                'Nonce': cartNonce  // Header correcto confirmado via debug
              };
              if (cartToken) headers['Cart-Token'] = cartToken;

              const response = await fetch('https://ninetywear.com/wp-json/wc/store/v1/cart/remove-item', {
                method: 'POST',
                headers: headers,
                credentials: 'include',
                body: JSON.stringify({ key: itemKey })
              });
              
              if (response.ok) {
                 setTerminalLogs(prev => [...prev, `> DELETION_COMPLETE: [OK]`]);
                 await fetchCart();
              } else {
                 setTerminalLogs(prev => [...prev, `> ERROR: DELETION_REFUSED_BY_SERVER`]);
              }
            } catch (err) {
              console.error("Remove error:", err);
              setTerminalLogs(prev => [...prev, `> FATAL: CONNECTION_TIMEOUT`]);
            } finally {
              setIsUpdatingCart(false);
              setTimeout(() => setTerminalLogs(prev => prev.slice(1)), 4000);
            }
          };

          // --- PAYPAL SDK LOADER ---
          useEffect(() => {
            if (checkoutStep === 'payment') {
              // Limpiar script anterior si existía
              const existing = document.getElementById('paypal-sdk');
              if (existing) existing.remove();
              window.paypal = undefined;
              setPaypalLoaded(false);

              const script = document.createElement('script');
              // SANDBOX MODE - cambiar a live client-id para producción
              script.id = 'paypal-sdk';
              script.src = "https://www.sandbox.paypal.com/sdk/js?client-id=Aen8OtPD1Xqo7PqhAggNVC2uhrSBd8Sc7jgU4qCRy6afUe83W_wFOG1Chkk9pdVDVPfKPr__WcB4DuGh&currency=USD";
              script.addEventListener('load', () => setPaypalLoaded(true));
              script.addEventListener('error', () => console.error('[NTY] PayPal SDK failed to load'));
              document.body.appendChild(script);
            }
          }, [checkoutStep]);

          const placeOrder = async (paymentData) => {
             setCheckoutStep('processing');
             try {
               const response = await fetch('https://ninetywear.com/wp-json/wc/store/v1/checkout', {
                 method: 'POST',
                 headers: { 
                   'Content-Type': 'application/json',
                   'X-WC-Store-API-Nonce': cartNonce
                 },
                 body: JSON.stringify({
                    billing_address: shippingDetails,
                    shipping_address: shippingDetails,
                    payment_method: 'paypal',
                    payment_data: [
                      { key: 'paypal_order_id', value: paymentData.orderID }
                    ]
                 })
               });
               
               if (response.ok) {
                 setCheckoutStep('success');
                 setCart(null); 
               } else {
                 alert("ERROR EN LA SINCRO");
                 setCheckoutStep('payment');
               }
             } catch (err) {
               setCheckoutStep('payment');
             }
          };

          // Alternar Dark Mode en el DOM
          useEffect(() => {
            if (isDark) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDark]);

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 30);
            window.addEventListener('scroll', handleScroll);
            
            // Reloj del sistema tech
            const interval = setInterval(() => {
              const now = new Date();
              setSystemTime(`${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')} // ${now.getMilliseconds().toString().padStart(3, '0')}ms`);
            }, 47);

            return () => {
              window.removeEventListener('scroll', handleScroll);
              clearInterval(interval);
            };
          }, []);

          // COLECCIONES ACTUALIZADAS (Imágenes corregidas para evitar mal encuadre)
          const collections = [
            { 
              id: 'ait', 
              title: 'AIT', 
              subtitle: '(Always in troubles)', 
              desc: 'ERR_BEHAVIOR_NOT_FOUND. Rebeldía cruda y anarquía urbana.', 
              img: 'https://image.pollinations.ai/prompt/purple%20lilac%20urban%20aesthetic%20streetwear?width=800&height=800&nologo=true',
              imgPosition: 'object-center',
              style: 'md:col-span-6 md:row-span-1 bg-[#F4F4F0] dark:bg-[#111] text-black dark:text-white border-r border-b border-black dark:border-white/30' 
            },
            { 
              id: 'audio', 
              title: 'AUDIO TRAUMA', 
              subtitle: 'FREQ: 140BPM+', 
              desc: 'Ondas destructivas. Estética rave y distorsión sónica.',

                          <div className="w-2 h-2 bg-[#00F0FF] animate-pulse delay-100"></div>
                        </div>
                        
                        <h3 className="font-black text-2xl md:text-3xl mb-6 border-b-2 border-black dark:border-white pb-4 w-full uppercase">DATOS_TÉCNICOS:</h3>
                        <ul className="space-y-4 text-xs md:text-sm w-full font-bold">
                          <li className="flex flex-col md:flex-row md:justify-between border-b border-dashed border-gray-300 dark:border-gray-800 pb-2 gap-1"><span className="text-gray-500 block text-left">ESTADO_RED:</span> <span className="text-[#00F0FF] px-2 bg-black w-max">ONLINE_ENCRYPTED</span></li>
                          <li className="flex flex-col md:flex-row md:justify-between border-b border-dashed border-gray-300 dark:border-gray-800 pb-2 gap-1"><span className="text-gray-500 block text-left">BASE_OP:</span> <span className="text-black dark:text-white block">LIMA_PE [SEC_05]</span></li>
                          <li className="flex flex-col md:flex-row md:justify-between border-b border-dashed border-gray-300 dark:border-gray-800 pb-2 gap-1"><span className="text-gray-500 block text-left">NÚCLEO_TEXTIL:</span> <span className="text-black dark:text-white block">ALGODÓN / NYLON / HARDWARE</span></li>
                          <li className="flex flex-col md:flex-row md:justify-between border-b border-dashed border-gray-300 dark:border-gray-800 pb-2 gap-1"><span className="text-gray-500 block text-left">NIVEL_ACTITUD:</span> <span className="text-[#FF003C] animate-pulse w-max">MÁXIMA_HOSTILIDAD</span></li>
                        </ul>
                        
                        <div className="mt-8 bg-black dark:bg-[#1a1a1a] border border-gray-800 text-[#00F0FF] p-4 text-[10px] md:text-xs break-words font-normal text-left shadow-inner">
                          <span className="text-gray-500">[root@NINETYWEAR:~]$</span> cat mission_statement.txt <br/><br/>
                          <span className="text-white">&gt; Cargar módulo de supervivencia en entorno hostil urbano.</span><br/>
                          <span className="text-white">&gt; Rechazar lo ordinario. Hackear la estética.</span><br/>
                          <span className="text-white">&gt; Imponer el Caos.</span><br/>
                          <span className="text-[#FF003C] block mt-4 text-[9px] animate-pulse font-bold tracking-widest break-all">EJECUCIÓN COMPLETADA EN 0.04s.</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* --- FATAL ERROR FOOTER --- */}
              <footer id="system" className="bg-black dark:bg-tech-darkbg pt-20 pb-8 border-t-[8px] border-[#FF003C] relative overflow-hidden">
                <div className="absolute -left-[20%] top-10 text-[20rem] font-black text-white/5 pointer-events-none select-none leading-none tracking-tighter whitespace-nowrap">
                  FALLO_SISTEMA
                </div>

                <div className="max-w-7xl mx-auto px-4 md:px-8 relative z-10 text-white">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-16 mb-16 border-b border-gray-800 pb-16">
                    <div>
                      <div className="flex items-center gap-2 text-[#FF003C] mb-4">
                        <Cpu size={24} />
                        <span className="font-tech font-bold text-sm tracking-widest">NINETYWEAR_OS v3.2</span>
                      </div>
                      <h2 className="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-[0.8] mb-6 text-outline-white">
                        FIN_DE<br/>ARCHIVO<span className="text-[#00F0FF] -webkit-text-stroke-0">_</span>
                      </h2>
                      <p className="font-tech text-sm text-gray-400 max-w-sm border-l-2 border-[#FF003C] pl-4">
                        No somos una marca, somos un bug en el sistema. Ropa diseñada para sobrevivir a la sobrecarga de información. Lima, PE.
                      </p>
                    </div>

                    <div className="bg-[#111] border border-gray-800 p-6 font-tech text-sm">
                      <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-2 text-xs text-gray-500">
                        <span>Terminal.exe</span>
                        <div className="flex gap-1">
                          <div className="w-2 h-2 bg-gray-600 rounded-full"></div>
                          <div className="w-2 h-2 bg-gray-600 rounded-full"></div>
                          <div className="w-2 h-2 bg-[#FF003C] rounded-full"></div>
                        </div>
                      </div>
                      <p className="text-[#00F0FF] mb-4">&gt; Estableciendo conexión cifrada con servidor primario...</p>
                      <p className="mb-4">Ingresa tu correo para recibir parches de sistema y accesos a nuevos drops ocultos.</p>
                      <div className="flex border border-[#00F0FF]">
                        <span className="bg-[#00F0FF] text-black px-3 py-2 font-bold">&gt;</span>
                        <input type="email" placeholder="USUARIO@MAIL.COM" className="w-full bg-transparent px-4 outline-none text-[#00F0FF] placeholder-gray-600 uppercase" />
                        <button className="bg-[#00F0FF] text-black font-bold px-4 hover:bg-white transition-colors">
                          [ENTER]
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center font-tech text-xs text-gray-500 gap-6">
                    <div className="flex space-x-6 uppercase">
                      <a href="#" className="hover:text-white transition-colors">[ INSTAGRAM ]</a>
                      <a href="#" className="hover:text-white transition-colors">[ X_TWITTER ]</a>
                      <a href="#" className="hover:text-white transition-colors">[ GITHUB ]</a>
                    </div>
                    
                    <div className="flex flex-wrap gap-4 uppercase text-right">
                      <a href="#" className="hover:text-[#FF003C] transition-colors">&gt; CONDICIONES_USO.txt</a>
                      <a href="#" className="hover:text-[#FF003C] transition-colors">&gt; POLÍTICA_PRIVACIDAD.log</a>
                      <p className="text-white w-full md:w-auto mt-4 md:mt-0">©2026 // SYSTEM TERMINATED.</p>
                    </div>
                  </div>
                </div>
              </footer>

              {/* TERMINAL UI MODAL PARA EL CARRITO */}
              {terminalLogs.length > 0 && (
                <div className="fixed bottom-4 left-4 z-[100] w-72 md:w-80 bg-black/95 border-l-4 border-y border-r border-[#00F0FF] border-r-gray-800 border-y-gray-800 p-4 text-[#CCFF00] font-tech text-[10px] md:text-xs pointer-events-none flex flex-col gap-2 shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                  {terminalLogs.map((log, i) => (
                    <p key={i} className="animate-pulse">{log}</p>
                  ))}
                  <div className="w-full h-1 bg-[#00F0FF]/20 mt-1 overflow-hidden relative">
                    <div className="absolute top-0 left-0 h-full bg-[#00F0FF] animate-marquee w-full"></div>
                  </div>
                </div>
              )}

              {/* --- FAKE SALES POPUP (MARKETING BANNER) --- */}
              {fakeSale && (
                <div className="fixed bottom-4 left-4 md:bottom-8 md:left-8 z-[110] w-[280px] md:w-[320px] bg-white dark:bg-black border-[3px] border-black dark:border-[#FF003C] p-3 text-black dark:text-white flex gap-3 shadow-[8px_8px_0_0_#000] dark:shadow-[8px_8px_0_0_#FF003C] animate-[static-glitch_0.2s_1] group cursor-default">
                  <div className="absolute top-0 right-0 bg-black dark:bg-[#FF003C] text-[#00F0FF] dark:text-black text-[8px] font-tech px-2 py-0.5 tracking-widest uppercase z-10">
                    SYS_LOG // {fakeSale.time}
                  </div>
                  
                  {/* Foto cuadrada */}
                  <div className="w-16 h-16 bg-gray-100 dark:bg-[#111] flex-shrink-0 border border-black dark:border-gray-800 relative overflow-hidden">
                    <img src={fakeSale.img} alt="Product purchased" className="w-full h-full object-cover grayscale opacity-90 mix-blend-multiply dark:mix-blend-normal" />
                    <div className="absolute inset-0 bg-black/5 scanlines pointer-events-none"></div>
                  </div>
                  
                  {/* Copywriter data */}
                  <div className="flex flex-col flex-1 justify-center relative pt-2">
                    <p className="font-bold text-xs uppercase mb-0.5 line-clamp-1" dangerouslySetInnerHTML={{ __html: fakeSale.product }}></p>
                    <p className="font-tech text-[9px] md:text-[10px] text-gray-500 leading-tight">
                      <span className="text-[#FF003C] font-bold">[{fakeSale.user}]</span><br/>
                      acaba de adquirir esta armadura.
                    </p>
                  </div>
                </div>
              )}
              {/* --- HEADLESS CART DRAWER (INVENTARIO) --- */}
              <div className={`fixed inset-0 z-[200] transition-opacity duration-500 ${isCartOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                <div className={`absolute top-0 right-0 h-full w-full max-w-md bg-white dark:bg-[#050505] border-l-4 border-black dark:border-[#FF003C] shadow-2xl transition-transform duration-500 flex flex-col scanlines ${isCartOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                  
                  {/* Header Drawer */}
                  <div className="p-6 border-b-4 border-black dark:border-[#FF003C] flex justify-between items-center bg-black text-white">
                    <div className="flex flex-col">
                      <span className="font-tech text-[#00F0FF] text-[10px] animate-pulse">&gt; SYS_INVENTORY_MANAGER</span>
                      <h2 className="text-2xl font-black uppercase tracking-tighter">MIS_ARCHIVOS</h2>
                    </div>
                    <button onClick={() => setIsCartOpen(false)} className="hover:text-[#FF003C] transition-colors">
                      <X size={32} />
                    </button>
                  </div>

                  {/* Items List */}
                  <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4 custom-scrollbar">
                    {cart && cart.items.length > 0 ? (
                      cart.items.map((item) => (
                        <div key={item.key} className="flex gap-4 border-2 border-black dark:border-gray-800 p-3 relative group bg-gray-50 dark:bg-[#111]">
                          <div className="w-20 h-20 bg-gray-200 dark:bg-black border border-black overflow-hidden flex-shrink-0">
                             <img src={item.images[0].src} alt={item.name} className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all" />
                          </div>
                          <div className="flex-1 flex flex-col justify-between py-1">
                            <div>
                               <h3 className="font-black uppercase text-xs text-black dark:text-white leading-tight mb-1" dangerouslySetInnerHTML={{ __html: item.name }}></h3>
                               <p className="font-tech text-[10px] text-gray-500">CANT: {item.quantity}</p>
                            </div>
                            <div className="flex justify-between items-end">
                               <span className="font-tech font-bold text-sm">$ {(parseFloat(item.totals.line_total) / 100).toFixed(2)}</span>
                               <button 
                                 onClick={() => removeFromCart(item.key)}
                                 className="text-[10px] font-tech text-[#FF003C] border border-[#FF003C] px-2 py-0.5 hover:bg-[#FF003C] hover:text-white transition-colors"
                               >
                                 [ ELIMINAR ]
                               </button>
                            </div>
                          </div>
                          {isUpdatingCart && <div className="absolute inset-0 bg-black/20 flex items-center justify-center backdrop-blur-[1px]"><Activity size={20} className="animate-spin text-[#00F0FF]" /></div>}
                        </div>
                      ))
                    ) : (
                      <div className="h-full flex flex-col items-center justify-center opacity-30 text-black dark:text-white">
                        <ShoppingCart size={64} className="mb-4 stroke-[1]" />
                        <p className="font-tech text-xs">INVENTARIO VACÍO. ESPERANDO DATOS...</p>
                      </div>
                    )}
                  </div>

                  {/* Footer Drawer */}
                  {cart && cart.items.length > 0 && (
                    <div className="p-6 bg-black text-white border-t-2 border-[#FF003C]">
                      <div className="flex justify-between items-center mb-6 font-tech">
                        <span className="text-xs text-gray-500 uppercase">SUBTOTAL_SYSTEM:</span>
                        <span className="text-xl font-bold">$ {(parseFloat(cart.totals.total_price) / 100).toFixed(2)}</span>
                      </div>
                      <button 
                        onClick={() => { setIsCartOpen(false); setCheckoutStep('shipping'); }}
                        className="w-full bg-[#00F0FF] text-black font-black uppercase py-4 flex items-center justify-center gap-2 hover:bg-[#FF003C] hover:text-white transition-all shadow-[4px_4px_0_0_#FFF] hover:shadow-none hover:translate-x-1 hover:translate-y-1"
                      >
                        <Power size={20} /> EJECUTAR_TRANSACCION
                      </button>
                      <p className="mt-4 text-[9px] font-tech text-center text-gray-600">
                        * LA TRANSACCIÓN SE EJECUTARÁ EN EL PANEL DE SEGURIDAD NATIVO.
                      </p>
                    </div>
                  )}
                </div>
              </div>

              {/* --- NATIVE SYSTEM CHECKOUT OVERLAY --- */}
              {checkoutStep && (
                <div className="fixed inset-0 z-[300] bg-black flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-[#FF003C]/5 scanlines"></div>
                  
                  <div className="w-full max-w-2xl bg-black border-2 border-[#FF003C] p-6 md:p-10 relative overflow-y-auto flex flex-col max-h-[95vh] custom-scrollbar">
                    <div className="absolute top-0 left-0 w-full h-1 bg-[#FF003C] animate-pulse sticky z-50"></div>
                    
                    {/* Header Terminal */}
                    <div className="flex justify-between items-start mb-8 border-b border-[#FF003C]/30 pb-4">
                       <div>
                          <span className="font-tech text-[#FF003C] text-[10px]">&gt; SYSTEM_SECURE_PAYMENT_v3.2</span>
                          <h2 className="text-3xl md:text-5xl font-black uppercase tracking-tighter text-white">
                            {checkoutStep === 'shipping' && "DATOS_ENVIÓ"}
                            {checkoutStep === 'payment' && "PROTOCOLO_PAGO"}
                            {checkoutStep === 'processing' && "COMPILANDO..."}
                            {checkoutStep === 'success' && "ACCESO_CONCEDIDO"}
                          </h2>
                       </div>
                       <button onClick={() => setCheckoutStep(null)} className="text-gray-500 hover:text-white transition-colors">
                          <X size={32} />
                       </button>
                    </div>

                    {/* Step 1: Shipping Form */}
                    {checkoutStep === 'shipping' && (
                      <div className="space-y-6 overflow-y-auto custom-scrollbar pr-4">
                        <div className="grid grid-cols-2 gap-4">
                          <input type="text" placeholder="NOMBRE" className="bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.first_name} onChange={(e)=>setShippingDetails({...shippingDetails, first_name: e.target.value})} />
                          <input type="text" placeholder="APELLIDO" className="bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.last_name} onChange={(e)=>setShippingDetails({...shippingDetails, last_name: e.target.value})} />
                        </div>
                        <input type="email" placeholder="EMAIL@CYBER.COM" className="w-full bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.email} onChange={(e)=>setShippingDetails({...shippingDetails, email: e.target.value})} />
                        <input type="text" placeholder="DIRECCIÓN_FÍSICA" className="w-full bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.address_1} onChange={(e)=>setShippingDetails({...shippingDetails, address_1: e.target.value})} />
                        <div className="grid grid-cols-2 gap-4">
                           <input type="text" placeholder="CIUDAD" className="bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.city} onChange={(e)=>setShippingDetails({...shippingDetails, city: e.target.value})} />
                           <input type="text" placeholder="ZIP" className="bg-[#111] border border-gray-800 p-4 font-tech text-[#00F0FF] outline-none focus:border-[#FF003C]" value={shippingDetails.postcode} onChange={(e)=>setShippingDetails({...shippingDetails, postcode: e.target.value})} />
                        </div>
                        <button 
                          onClick={() => setCheckoutStep('payment')}
                          className="w-full bg-white text-black font-black uppercase py-4 shadow-[4px_4px_0_0_#FF003C] hover:shadow-none hover:translate-x-1 hover:translate-y-1 transition-all"
                        >
                          CONFIRMAR_COORDENADAS
                        </button>
                      </div>
                    )}

                    {/* Step 2: Payment (PayPal Buttons) */}
                    {checkoutStep === 'payment' && (
                      <div className="flex flex-col items-center justify-center space-y-8 py-10">
                         <div className="text-center">
                            <p className="font-tech text-xs text-gray-500 mb-2">ORDEN_TOTAL:</p>
                            <span className="text-5xl font-black text-[#00F0FF] tracking-tighter">
                               $ {(parseFloat(cart.totals.total_price) / 100).toFixed(2)}
                            </span>
                         </div>
                         
                         <div className="w-full max-w-sm relative z-50">
                            {paypalLoaded ? (
                              <PayPalButtonsWrapper 
                                amount={(parseFloat(cart.totals.total_price) / 100).toFixed(2)} 
                                onApprove={(data) => placeOrder(data)}
                              />
                            ) : (
                              <div className="flex items-center justify-center p-12 bg-[#111] border border-dashed border-gray-700 animate-pulse">
                                 <p className="font-tech text-xs">CARGANDO_PUENTE_PAYPAL...</p>
                              </div>
                            )}
                         </div>
                         
                         <button onClick={() => setCheckoutStep('shipping')} className="font-tech text-[10px] text-gray-500 underline uppercase hover:text-white transition-colors">
                           &lt; VOLVER_A_ENTRADA_DATOS
                         </button>
                      </div>
                    )}

                    {/* Step Processing */}
                    {checkoutStep === 'processing' && (
                      <div className="flex flex-col items-center justify-center py-20 space-y-6">
                         <Activity size={64} className="text-[#00F0FF] animate-spin" />
                         <p className="font-tech text-sm animate-pulse">INJECTING_ORDER_PAYLOAD... ESPERE.</p>
                      </div>
                    )}

                    {/* Step Success */}
                    {checkoutStep === 'success' && (
                      <div className="flex flex-col items-center justify-center py-20 text-center space-y-6">
                         <div className="w-20 h-20 bg-[#CCFF00] text-black flex items-center justify-center rounded-full shadow-[0_0_30px_rgba(204,255,0,0.5)]">
                            <Power size={40} />
                         </div>
                         <h3 className="text-4xl font-black uppercase text-white tracking-tighter">OPERACIÓN_EXITOSA</h3>
                         <p className="font-tech text-xs text-gray-400 max-w-xs">Orden procesada en el subespacio. Recibirás un log de confirmación en tu correo.</p>
                         <button 
                           onClick={() => { setCheckoutStep(null); setIsCartOpen(false); setCurrentPage('home'); }}
                           className="bg-[#FF003C] text-white px-8 py-3 font-black uppercase tracking-widest text-xs hover:bg-white hover:text-black transition-all"
                         >
                           [ CERRAR_CONEXIÓN ]
                         </button>
                      </div>
                    )}

                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
